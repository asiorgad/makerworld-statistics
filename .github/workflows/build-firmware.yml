name: Build Firmware

on:
  push:
    branches:
      - main
    paths:
      - '*.ino'
      - '.github/workflows/build-firmware.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - board: esp32:esp32:esp32
            name: ESP32
            output: makerstats.bin
          - board: esp32:esp32:esp32c3
            name: ESP32-C3
            output: makerstats-c3.bin
          - board: esp32:esp32:esp32s3
            name: ESP32-S3
            output: makerstats-s3.bin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install libraries
        run: |
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install "TFT_eSPI"

      - name: Configure TFT_eSPI for GC9A01
        run: |
          # Get Arduino library path from arduino-cli
          ARDUINO_LIB_PATH=$(arduino-cli config get directories.user)/libraries/TFT_eSPI
          
          echo "Arduino CLI library path: $ARDUINO_LIB_PATH"
          
          # Fallback paths
          if [ ! -d "$ARDUINO_LIB_PATH" ]; then
            ARDUINO_LIB_PATH="$HOME/Arduino/libraries/TFT_eSPI"
          fi
          
          if [ ! -d "$ARDUINO_LIB_PATH" ]; then
            # Search for it
            ARDUINO_LIB_PATH=$(find $HOME -path "*/libraries/TFT_eSPI" -type d 2>/dev/null | head -1)
          fi
          
          echo "Using TFT_eSPI path: $ARDUINO_LIB_PATH"
          ls -la "$ARDUINO_LIB_PATH" || { echo "TFT_eSPI not found!"; exit 1; }
          
          # Create User_Setup.h for GC9A01
          cat > "$ARDUINO_LIB_PATH/User_Setup.h" << 'EOF'
          #define GC9A01_DRIVER
          #define TFT_WIDTH  240
          #define TFT_HEIGHT 240
          #define TFT_MISO -1
          #define TFT_MOSI 23
          #define TFT_SCLK 18
          #define TFT_CS   15
          #define TFT_DC    2
          #define TFT_RST   4
          #define TFT_BL   -1
          #define LOAD_GLCD
          #define LOAD_FONT2
          #define LOAD_FONT4
          #define LOAD_FONT6
          #define LOAD_FONT7
          #define LOAD_FONT8
          #define LOAD_GFXFF
          #define SMOOTH_FONT
          #define SPI_FREQUENCY  40000000
          EOF
          
          echo "User_Setup.h created successfully"

      - name: Compile firmware for ${{ matrix.name }}
        run: |
          # Create a properly named sketch folder
          mkdir -p mwstats
          cp mwstats.ino mwstats/
          # Compile sketch
          arduino-cli compile --fqbn ${{ matrix.board }} --output-dir ./build ./mwstats
          
          echo "=== Build output files ==="
          ls -la ./build/
          
      - name: Create merged binary for ${{ matrix.name }}
        run: |
          # Install esptool
          pip install esptool
          
          # Find the bootloader and partition table from the build
          BOOTLOADER=$(find ./build -name "*.bootloader.bin" | head -1)
          PARTITIONS=$(find ./build -name "*.partitions.bin" | head -1)
          APP_BIN=$(find ./build -name "mwstats.ino.bin" | head -1)
          
          echo "Bootloader: $BOOTLOADER"
          echo "Partitions: $PARTITIONS"
          echo "App: $APP_BIN"
          
          # Determine chip type and offsets
          CHIP="${{ matrix.name }}"
          if [ "$CHIP" = "ESP32" ]; then
            CHIP_ARG="esp32"
            BOOT_OFFSET="0x1000"
          elif [ "$CHIP" = "ESP32-C3" ]; then
            CHIP_ARG="esp32c3"
            BOOT_OFFSET="0x0"
          elif [ "$CHIP" = "ESP32-S3" ]; then
            CHIP_ARG="esp32s3"
            BOOT_OFFSET="0x0"
          fi
          
          # Create merged binary
          if [ -n "$BOOTLOADER" ] && [ -n "$PARTITIONS" ] && [ -n "$APP_BIN" ]; then
            esptool.py --chip $CHIP_ARG merge_bin \
              -o ./build/firmware_merged.bin \
              --flash_mode dio \
              --flash_freq 40m \
              --flash_size 4MB \
              $BOOT_OFFSET $BOOTLOADER \
              0x8000 $PARTITIONS \
              0x10000 $APP_BIN
            
            echo "=== Merged binary created ==="
            ls -la ./build/firmware_merged.bin
          else
            echo "ERROR: Missing required files for merge"
            exit 1
          fi

      - name: Rename binary
        run: |
          ls -la ./build/
          # Use the merged binary we created (includes bootloader + partition table + app)
          if [ -f "./build/firmware_merged.bin" ]; then
            echo "Using our merged binary"
            cp ./build/firmware_merged.bin ./build/${{ matrix.output }}
          else
            echo "ERROR: Merged binary not found!"
            exit 1
          fi
          ls -la ./build/${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.name }}
          path: ./build/${{ matrix.output }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Copy firmware to docs folder
        run: |
          mkdir -p docs/firmware
          cp ./artifacts/firmware-ESP32/makerstats.bin docs/firmware/ || true
          cp ./artifacts/firmware-ESP32-C3/makerstats-c3.bin docs/firmware/ || true
          cp ./artifacts/firmware-ESP32-S3/makerstats-s3.bin docs/firmware/ || true
          ls -la docs/firmware/

      - name: Commit and push firmware
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/firmware/
          git diff --staged --quiet || git commit -m "Update firmware binaries [skip ci]"
          git push
